<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Page</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="form-container">
        <h1>Register</h1>
        <form action="connect.php" method="post">
            <input type="text" name="FirstName" class="text-field" placeholder="First Name" required>
            <input type="text" name="LastName" class="text-field" placeholder="Last Name" required>
            <input type="text" name="Contact" class="text-field" placeholder="Contact" required>
            <input type="email" name="Email" class="text-field" placeholder="Email" required>
            <input type="password" name="Password" class="text-field" placeholder="Password" required>
            <input type="submit" value="Register" class="submit-btn">
        </form>
    </div>
</body>
</html>
